apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eventhub-ingress
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - eventhub.local
      secretName: tls-secret
  rules:
    - host: eventhub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: event-service
                port:
                  number: 80