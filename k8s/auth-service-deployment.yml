apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: migrate
          image: valentinng00/auth-service
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for postgres..."
              until nc -z postgres-service 5432; do
                sleep 2
              done
              echo "Postgres is up"
              python manage.py migrate
      containers:
        - name: auth-service
          image: valentinng00/auth-service:5
          imagePullPolicy: Always